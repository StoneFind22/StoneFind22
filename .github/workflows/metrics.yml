name: GitHub Metrics

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          # Auth token — needs repo + read:user scopes
          token: ${{ secrets.GH_TOKEN }}
          
          # Output file committed to your profile repo
          filename: github-metrics.svg
          
          # ── Base config ──────────────────────────────
          user: StoneFind22
          template: classic
          base: header, activity, community, repositories, metadata
          
          # Include private repos in all counters
          repositories_visibility: all      # public + private
          
          # ── Plugins ──────────────────────────────────

          # Languages breakdown (includes private repos)
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 10
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_languages_indepth: yes        # deep scan incl. private

          # Most starred / recent repos
          plugin_repositories: yes
          plugin_repositories_featured: ""

          # Coding habits (commit times, editors, etc.)
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_trim: yes

          # Achievements / badges
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C

          # ── Visual theme ─────────────────────────────
          config_timezone: America/Lima
          config_order: base.header, base.activity, base.community, base.repositories, languages, habits, achievements
